<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Super Wheel — a futuristic, fair random picker with cryptographically secure randomness, neon visuals, and smooth animations.">
  <title>Super Wheel</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ═══════════════════════════════════════════
       BACKGROUND LAYERS
       ═══════════════════════════════════════════ -->
  <canvas id="stars-canvas" aria-hidden="true"></canvas>
  <div class="nebula-overlay" aria-hidden="true"></div>

  <!-- ═══════════════════════════════════════════
       CONFETTI OVERLAY
       ═══════════════════════════════════════════ -->
  <canvas id="confetti-canvas" aria-hidden="true"></canvas>

  <!-- ═══════════════════════════════════════════
       APP SHELL
       ═══════════════════════════════════════════ -->
  <div class="app" id="app">
    <!-- ── HEADER ── -->
    <header class="app-header" role="banner">
      <div class="logo-group">
        <div class="logo-icon" aria-hidden="true">
          <svg viewBox="0 0 40 40" width="40" height="40">
            <circle cx="20" cy="20" r="18" fill="none" stroke="url(#logoGrad)" stroke-width="2.5"/>
            <circle cx="20" cy="20" r="10" fill="none" stroke="url(#logoGrad)" stroke-width="1.5" stroke-dasharray="4 3"/>
            <circle cx="20" cy="20" r="3" fill="url(#logoGrad)"/>
            <defs>
              <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#00f0ff"/>
                <stop offset="100%" stop-color="#b400ff"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="app-title">Super <span class="accent">Wheel</span></h1>
      </div>
      <p class="app-subtitle">Cryptographically fair &bull; Beautifully random</p>
    </header>

    <!-- ── MAIN CONTENT ── -->
    <main class="app-main" role="main">

      <!-- ════════════════ ENTRIES PANEL ════════════════ -->
      <aside class="glass-panel entries-panel" aria-label="Entry management">
        <div class="panel-header">
          <h2 class="panel-title">
            <svg class="panel-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
            Entries
          </h2>
          <span class="entry-count" id="entry-count" aria-live="polite">0</span>
        </div>

        <!-- Input area -->
        <div class="input-group">
          <textarea
            id="name-input"
            class="glass-input"
            placeholder="Enter names — one per line&#10;Paste a list to bulk-add"
            rows="3"
            aria-label="Enter names to add to the wheel"
          ></textarea>
          <div class="btn-row">
            <button id="add-btn" class="btn btn-primary" aria-label="Add entries">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add
            </button>
            <button id="shuffle-btn" class="btn btn-secondary" aria-label="Shuffle entries">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
              Shuffle
            </button>
            <button id="clear-btn" class="btn btn-danger" aria-label="Clear all entries">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              Clear
            </button>
          </div>
        </div>

        <!-- Settings -->
        <div class="settings-row">
          <label class="toggle-label" for="prevent-duplicates">
            <div class="toggle-switch">
              <input type="checkbox" id="prevent-duplicates" role="switch" aria-checked="false">
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </div>
            Prevent duplicates
          </label>
          <label class="toggle-label" for="sound-toggle">
            <div class="toggle-switch">
              <input type="checkbox" id="sound-toggle" role="switch" aria-checked="true" checked>
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </div>
            Sound
          </label>
        </div>

        <!-- Entry list -->
        <ul class="entry-list" id="entry-list" role="list" aria-label="Current entries"></ul>
      </aside>

      <!-- ════════════════ WHEEL SECTION ════════════════ -->
      <section class="wheel-section" aria-label="Spin wheel">
        <div class="wheel-stage">
          <!-- 3D floating container -->
          <div class="wheel-container" id="wheel-container">
            <div class="wheel-glow" aria-hidden="true"></div>
            <canvas id="wheel-canvas" width="500" height="500" aria-label="Spin wheel canvas"></canvas>
            <!-- Pointer / ticker -->
            <div class="wheel-pointer" aria-hidden="true">
              <svg viewBox="0 0 40 50" width="40" height="50">
                <defs>
                  <filter id="pointerGlow">
                    <feGaussianBlur stdDeviation="3" result="blur"/>
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                  </filter>
                  <linearGradient id="pointerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#00f0ff"/>
                    <stop offset="100%" stop-color="#b400ff"/>
                  </linearGradient>
                </defs>
                <polygon points="20,50 5,10 20,0 35,10" fill="url(#pointerGrad)" filter="url(#pointerGlow)" stroke="#fff" stroke-width="1"/>
              </svg>
            </div>
          </div>

          <!-- Spin button -->
          <button id="spin-btn" class="spin-button" aria-label="Spin the wheel">
            <span class="spin-btn-text">SPIN</span>
            <span class="spin-btn-ring" aria-hidden="true"></span>
          </button>
        </div>
      </section>

      <!-- ════════════════ HISTORY PANEL ════════════════ -->
      <aside class="glass-panel history-panel" aria-label="Winner history">
        <div class="panel-header">
          <h2 class="panel-title">
            <svg class="panel-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
            Winners
          </h2>
          <button id="clear-history-btn" class="btn btn-ghost btn-sm" aria-label="Clear winner history">Clear</button>
        </div>
        <ol class="history-list" id="history-list" role="list" aria-label="Winner history list"></ol>
        <div class="history-empty" id="history-empty">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
          <p>No winners yet.<br>Spin the wheel!</p>
        </div>
      </aside>
    </main>
  </div>

  <!-- ═══════════════════════════════════════════
       WINNER MODAL
       ═══════════════════════════════════════════ -->
  <div class="modal-overlay" id="winner-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal-card">
      <div class="modal-particles" aria-hidden="true"></div>
      <div class="modal-badge" aria-hidden="true">
        <svg viewBox="0 0 80 80" width="80" height="80">
          <defs>
            <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00f0ff"/>
              <stop offset="50%" stop-color="#b400ff"/>
              <stop offset="100%" stop-color="#ff006e"/>
            </linearGradient>
          </defs>
          <circle cx="40" cy="40" r="36" fill="none" stroke="url(#badgeGrad)" stroke-width="3"/>
          <text x="40" y="48" text-anchor="middle" font-size="32" fill="url(#badgeGrad)">🏆</text>
        </svg>
      </div>
      <h2 class="modal-title" id="modal-title">Winner!</h2>
      <p class="modal-winner-name" id="winner-name"></p>
      <button id="close-modal-btn" class="btn btn-primary btn-lg" aria-label="Close winner modal">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
        Awesome!
      </button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       SCREEN-READER LIVE REGION
       ═══════════════════════════════════════════ -->
  <div id="sr-announce" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

  <script src="script.js"></script>
</body>
</html>
